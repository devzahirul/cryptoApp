name: crypto_wallet
description: "Fintech Crypto Wallet App - MVP with Supabase, Riverpod, and CoinGecko"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ^3.22.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  qr_flutter: ^4.1.0

  # Security & Crypto
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.3.0
  flutter_dotenv: ^5.1.0

  # Web support
  universal_io: ^2.2.2
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

  # Linting & Testing
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env.local
